services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend/data:/data
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build: ./frontend
    ports:
      - "3001:3001"
    env_file:
      - path: ./frontend/.env.local
        required: false
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
